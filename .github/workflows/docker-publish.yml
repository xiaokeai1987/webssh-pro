name: Build and Push to GHCR 🚀

# 触发条件：当你 push 代码到 main 分支，或者发布 Release 时触发
on:
  push:
    branches: [ "main" ]
  release:
    types: [published]

# 【核心魔法】：给 GitHub 自动生成的 Token 赋予读取代码和写入镜像包的权限
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取你的最新代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 配置 Docker 构建环境
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 免密登录到 GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 自动提取动态 Tag (main分支=latest，Release=版本号)
      # ${{ github.repository }} 会自动解析为你的 xiaokeai1987/webssh-pro
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=ref,event=tag

      # 5. 构建并推送到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 开启 GitHub 专属构建缓存，下次打包速度起飞
          cache-from: type=gha
          cache-to: type=gha,mode=max
